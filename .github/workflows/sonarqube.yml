name: SonarQube and Trivy Scan

on:
  push:
    branches:
      - main

jobs:
  security-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # =========================
      # START: Trivy Filesystem Scan
      # =========================
      - name: Run Trivy Filesystem Scan
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
      # =========================
      # END: Trivy Filesystem Scan
      # =========================

      # =========================
      # START: Docker Build
      # =========================
      - name: Build Docker Image
        run: docker build -t demo-app:${{ github.sha }} .
      # =========================
      # END: Docker Build
      # =========================

      # =========================
      # START: Trivy Image Scan
      # =========================
      - name: Run Trivy Image Scan
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: demo-app:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
      # =========================
      # END: Trivy Image Scan
      # =========================

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # =========================
      # START: SonarQube Scan
      # =========================
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SonarQube Quality Gate Check
        uses: sonarsource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      # =========================
      # END: SonarQube Scan
      # =========================